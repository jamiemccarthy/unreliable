name: Push Gem

on:
  push:
    tags:
      - v*

jobs:
  push:
    if: github.repository == 'jamiemccarthy/unreliable'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      # Set up
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby

      # Release
      - uses: rubygems/release-gem@v1
